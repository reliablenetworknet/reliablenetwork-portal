<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message received — Reliable Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0f2340; --gold: #f4c842; --green: #16a34a; --gray-400: #94a3b8; --gray-600: #475569; }
    body { font-family: 'DM Sans', sans-serif; background: #0f2340; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.3);
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .check-circle {
      width: 72px; height: 72px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 32px; }
    .brand { font-size: 15px; font-weight: 600; color: var(--navy); }
    h1 { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 600; color: var(--navy); margin-bottom: 14px; line-height: 1.2; }
    p { font-size: 15px; color: var(--gray-600); line-height: 1.7; margin-bottom: 32px; }
    .highlight { color: var(--navy); font-weight: 600; }
    .btn {
      display: inline-block;
      padding: 13px 28px;
      background: var(--navy);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn:hover { background: #1a3560; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(15,35,64,0.2); }
    .footer-note { margin-top: 20px; font-size: 12px; color: var(--gray-400); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
        <rect width="100" height="100" rx="20" fill="#0f2340"/>
        <path d="M50 8 L80 20 L80 54 Q80 76 50 92 Q20 76 20 54 L20 20 Z" fill="none" stroke="white" stroke-width="1.2" opacity="0.25"/>
        <rect x="38" y="20" width="24" height="2.5" rx="1.25" fill="#f4c842" opacity="0.9"/>
        <text x="50" y="62" font-family="DM Sans,sans-serif" font-size="32" font-weight="500" fill="white" text-anchor="middle" letter-spacing="2">RN</text>
        <circle cx="42" cy="88" r="2" fill="#f4c842" opacity="0.7"/>
        <circle cx="50" cy="90" r="2" fill="white" opacity="0.4"/>
        <circle cx="58" cy="88" r="2" fill="#f4c842" opacity="0.7"/>
      </svg>
      <span class="brand">Reliable Network</span>
    </div>
    <div class="check-circle">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Message received!</h1>
    <p>Thank you for reaching out to <span class="highlight">Reliable Network</span>. We've received your message and will get back to you at <span class="highlight">ops@reliablenetwork.net</span> within 2 hours.</p>
    <a href="/" class="btn">← Back to homepage</a>
    <div class="footer-note">© 2025 Reliable Network LLC · Tampa, FL</div>
  </div>
</body>
</html>
